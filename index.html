<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retail Sales Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #1A1A2E;
            font-family: 'Segoe UI', sans-serif;
            color: white;
        }
        .header {
            background: linear-gradient(135deg, #16213E, #0F3460);
            padding: 25px;
            text-align: center;
            border-bottom: 3px solid #00B4D8;
        }
        .header h1 {
            font-size: 32px;
            color: #00B4D8;
            letter-spacing: 3px;
        }
        .header p {
            font-size: 14px;
            color: #aaa;
            margin-top: 8px;
        }
        .dashboard-container {
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .report-frame {
            width: 100%;
            height: 700px;
            border: none;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0,180,216,0.3);
        }
        .footer {
            text-align: center;
            padding: 15px;
            color: #555;
            font-size: 12px;
            border-top: 1px solid #16213E;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📊 RETAIL SALES DASHBOARD</h1>
        <p>Interactive Sales Analysis — Powered by Power BI</p>
    </div>
    <div class="dashboard-container">
        <iframe 
            class="report-frame"
            title="Client model" 
            src="https://app.powerbi.com/reportEmbed?reportId=05fc0a80-b22f-453c-bf7b-2dc173538e47&autoAuth=true&ctid=887bc72c-bba0-4d42-9ecf-8ed02059a1d5" 
            frameborder="0" 
            allowFullScreen="true">
        </iframe>
    </div>
    <div class="footer">
        <p>Data Source: FRED Economic Data | Retail Sales Analysis | Kasadara</p>
    </div>
</body>
</html>
